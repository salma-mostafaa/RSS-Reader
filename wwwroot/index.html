<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal RSS Reader</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <header class="masthead">
        <div class="masthead-brand">
            <div>
                <h1>Personal RSS Reader</h1>
            </div>
        </div>

        <div class="masthead-actions">
            <button id="refreshAllButton" class="icon-btn" type="button" title="Refresh all feeds">
                <span class="refresh-icon" aria-hidden="true">&#8635;</span>
                <span class="btn-label">Refresh all</span>
            </button>
            <button id="themeToggle" class="icon-btn theme-toggle" type="button" title="Toggle dark mode" aria-pressed="false">
                <span class="theme-icon sun" aria-hidden="true">&#9728;</span>
                <span class="theme-icon moon" aria-hidden="true">&#9789;</span>
            </button>
        </div>
    </header>

    <main>
        <section class="add-feed">
            <input id="feedUrl"
                   type="text"
                   placeholder="https://example.com/feed.xml">

            <button id="addFeedButton" type="button">
                Add feed
            </button>
        </section>
        <span id="feedUrlError" class="field-error" hidden>Please enter a feed URL first</span>

        <section>
            <div class="feeds-heading">
                <h2>Subscriptions</h2>
                <button id="feedsToggle" class="feeds-toggle" type="button" hidden>
                    <span class="feeds-toggle-text">Show all</span>
                    <span class="feeds-toggle-icon" aria-hidden="true">&#9662;</span>
                </button>
            </div>
            <div id="feeds"></div>
        </section>

        <section>
            <div class="articles-heading">
                <h2>Dispatches</h2>
                <span id="articleCount" class="article-count"></span>
            </div>
            <input id="articleSearch"
                   class="article-search"
                   type="text"
                   placeholder="Search articles by title">
            <div id="filters"></div>
            <button id="filtersToggle" class="feeds-toggle filters-toggle" type="button" hidden>
                <span class="feeds-toggle-text">Show more</span>
                <span class="feeds-toggle-icon" aria-hidden="true">&#9662;</span>
            </button>
            <div id="articles"></div>
        </section>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>
    <script src="js/script.js"></script>
</body>
</html>
